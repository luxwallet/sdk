name: Release
# Publishes all @luxwallet/* packages in this monorepo to npm on a v* tag.
# pnpm -r publishes in topological (dependency) order and rewrites workspace:*
# deps to real versions.
#
# PREREQUISITE: `@luxwallet` npm org + `NPM_TOKEN` secret (owner action).
# RELEASE ORDER across repos: publish luxwallet/connect FIRST (the sdk umbrella
# depends on @luxwallet/connect), then this monorepo, then luxwallet/ui.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm -r test
      - run: pnpm -r publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
